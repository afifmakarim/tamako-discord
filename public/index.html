<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tamako Bot - Your cheerful Discord assistant powered by Gemini AI.">
    <title>Tamako Bot - Your Cozy Discord Assistant</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/svgs/solid/heart.svg" type="image/svg+xml">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        tamako: {
                            bg: '#FFFBF0',
                            text: '#5D4037',
                            desc: '#6D4C41',
                            primary: '#FFB6C1',
                            hover: '#FF9EAB',
                            card: '#FFFFFF',
                            'dark-bg': '#15202B',
                            'dark-text': '#F5F5F5',
                            'dark-desc': '#B0BEC5',
                            'dark-primary': '#D48B9B',
                            'dark-hover': '#E89EAE',
                            'dark-card': '#1E2732'
                        }
                    },
                    animation: { 'float': 'float 6s ease-in-out infinite' },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } } }
                }
            }
        }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style>
        .bg-pattern {
            background-color: #FFFBF0;
            background-image: radial-gradient(#FFB6C1 1.5px, transparent 1.5px), radial-gradient(#E0F7FA 1.5px, transparent 1.5px);
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
        }
        .dark .bg-pattern {
            background-color: #15202B;
            background-image: radial-gradient(#D48B9B 1px, transparent 1px), radial-gradient(#243447 1px, transparent 1px);
        }
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }
    </style>
</head>
<body class="font-sans text-tamako-text dark:text-tamako-dark-text min-h-screen flex flex-col bg-pattern">

    <header class="sticky top-0 z-50 bg-gradient-to-br from-[#FFB6C1]/80 to-[#E0F7FA]/80 dark:from-[#D48B9B]/80 dark:to-[#243447]/80 backdrop-blur-md border-b-4 border-white dark:border-tamako-dark-card shadow-sm">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-20">
            <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img class="h-12 w-12 rounded-full border-[3px] border-white dark:border-tamako-dark-primary object-cover" src="https://i.pinimg.com/736x/10/f4/75/10f475b938c8e885cec9584817b55ea7.jpg" alt="Logo" width="48" height="48">
                <span class="font-bold text-2xl">Tamako</span>
            </a>
            <nav class="flex items-center gap-4">
                <button id="theme-toggle" aria-label="Toggle Dark Mode" class="p-3 rounded-full hover:bg-white/30 dark:hover:bg-black/30 transition-colors">
                    <i class="fa-solid fa-moon dark:hidden text-xl"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-xl"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4 sm:p-8 relative">
        <section class="max-w-3xl w-full mx-auto relative z-10">
            <div class="bg-white/95 dark:bg-tamako-dark-card/95 backdrop-blur-md rounded-[2.5rem] p-8 sm:p-14 shadow-2xl border-4 border-white dark:border-tamako-dark-hover text-center flex flex-col items-center">
                <div class="relative mb-8">
                    <img src="https://i.pinimg.com/736x/10/f4/75/10f475b938c8e885cec9584817b55ea7.jpg" alt="Avatar" class="w-40 h-40 rounded-full border-[6px] border-tamako-primary dark:border-tamako-dark-primary shadow-[0_8px_16px_rgba(255,182,193,0.4)] dark:shadow-[0_8px_16px_rgba(0,0,0,0.3)] object-cover animate-float" width="160" height="160">
                    <div class="absolute bottom-2 right-2 bg-green-500 w-8 h-8 rounded-full border-4 border-white dark:border-tamako-dark-card"></div>
                </div>
                <h1 class="text-4xl sm:text-6xl font-extrabold mb-4">
                    Tamako Bot
                </h1>
                <p class="text-lg sm:text-2xl text-tamako-desc dark:text-tamako-dark-desc max-w-2xl mx-auto mb-10 font-medium">
                    Your cheerful and warm server assistant, powered by Gemini AI. Bringing a cozy atmosphere to your community.
                </p>
                <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                    <a href="https://discord.com/oauth2/authorize?client_id=527171107204366337" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-3 bg-tamako-primary hover:bg-tamako-hover dark:bg-tamako-dark-primary dark:hover:bg-tamako-dark-hover text-white px-8 py-4 rounded-full font-bold text-xl hover:scale-105 transition-transform shadow-[0_4px_15px_rgba(255,182,193,0.5)] dark:shadow-[0_4px_15px_rgba(0,0,0,0.5)] w-full sm:w-auto">
                        <i class="fa-brands fa-discord text-2xl"></i>
                        <span>Add to Discord</span>
                    </a>
                    <a href="https://trakteer.id/rojokundo/tip?open=true" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-3 bg-[#C22828] hover:bg-[#A12020] text-white px-8 py-4 rounded-full font-bold text-xl hover:scale-105 transition-transform shadow-[0_4px_15px_rgba(194,40,40,0.5)] w-full sm:w-auto">
                        <i class="fa-solid fa-mug-hot text-2xl"></i>
                        <span>Support Me</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-tamako-desc dark:text-tamako-dark-desc py-8 mt-auto text-center font-medium">
        <p>&copy; 2026 Tamako Bot. Created by Rojokundo.</p>
        <div class="flex items-center justify-center gap-4 mt-2 font-bold">
            <a href="/terms-of-service" class="hover:text-tamako-text dark:hover:text-white">Terms of Service</a>
            <span>|</span>
            <a href="/privacy-policy" class="hover:text-tamako-text dark:hover:text-white">Privacy Policy</a>
        </div>
    </footer>

    <script>
        function toggleTheme(makeDark) {
            if (makeDark) {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            }
        }

        document.getElementById('theme-toggle').addEventListener('click', (e) => {
            const isDark = document.documentElement.classList.contains('dark');
            
            if (!document.startViewTransition) {
                toggleTheme(!isDark);
                return;
            }

            const x = e.clientX;
            const y = e.clientY;
            const endRadius = Math.hypot(
                Math.max(x, window.innerWidth - x),
                Math.max(y, window.innerHeight - y)
            );

            const transition = document.startViewTransition(() => {
                toggleTheme(!isDark);
            });

            transition.ready.then(() => {
                const clipPath = [
                    `circle(0px at ${x}px ${y}px)`,
                    `circle(${endRadius}px at ${x}px ${y}px)`
                ];
                document.documentElement.animate(
                    {
                        clipPath: clipPath,
                    },
                    {
                        duration: 600,
                        easing: 'ease-out',
                        pseudoElement: '::view-transition-new(root)',
                    }
                );
            });
        });
    </script>
</body>
</html>
